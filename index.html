<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/hollow-knight-silksong@master/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Hollow Knight SilkSong</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      body { background-color: #000; margin: 0; overflow: hidden; }
      #unity-container { width: 100%; height: 100%; position: absolute; }
      #unity-canvas { width: 100vw; height: 100vh; background: #000; }
      #loading-text { 
        position: absolute; top: 50%; left: 50%; 
        transform: translate(-50%, -50%);
        color: white; font-family: sans-serif; text-align: center; 
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>
    <div id="loading-text">INITIALIZING ENGINE...</div>
    <div id="unity-loading-bar" style="display:none;">
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full" style="background: #fff; height: 2px;"></div>
      </div>
    </div>

    <script>
      const loadingText = document.querySelector("#loading-text");
      const canvas = document.querySelector("#unity-canvas");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");

      const buildUrl = "Build";
      const config = {
        dataUrl: buildUrl + "/w-pt.data.unityweb",
        frameworkUrl: buildUrl + "/w-pt.framework.js.unityweb",
        codeUrl: buildUrl + "/w-pt.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Team Cherry",
        productName: "Hollow Knight Silksong",
        productVersion: "1.0",
        
        // --- CHROMEBOOK STABILITY TWEAKS ---
        devicePixelRatio: 1, // Stop 4K rendering on high-res screens
        matchWebGLToCanvasSize: true, 
        webglContextAttributes: {
          alpha: false,
          antialias: false, // Saves huge amounts of VRAM
          depth: true,
          preserveDrawingBuffer: false,
          powerPreference: "high-performance",
        },
      };

      // Load Unity Loader Script
      const script = document.createElement("script");
      script.src = "https://cdn.jsdelivr.net/gh/web-ports/hollow-knight-silksong@latest/Build/w-pt.loader.js";

      script.onload = () => {
        loadingText.textContent = "STARTING DOWNLOAD...";
        
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = (progress * 100) + "%";
          loadingText.textContent = "LOADING ASSETS: " + Math.round(progress * 100) + "%";
        })
        .then((unityInstance) => {
          loadingText.style.display = "none";
          document.querySelector("#unity-loading-bar").style.display = "none";
        })
        .catch((err) => {
          console.error(err);
          if (err.toString().toLowerCase().includes("memory")) {
            loadingText.textContent = "OUT OF MEMORY: Close other tabs and refresh!";
          } else {
            loadingText.textContent = "CRASH: " + err;
          }
        });
      };

      document.body.appendChild(script);

      // Prevent Chromebook from putting the tab to sleep during load
      window.addEventListener('beforeunload', function (e) {
        e.preventDefault();
        e.returnValue = '';
      });
    </script>
  </body>
</html>
