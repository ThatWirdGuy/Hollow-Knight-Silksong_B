<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/hollow-knight-silksong@master/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Hollow Knight SilkSong</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      /* Force a lower resolution for the canvas to save GPU RAM */
      #unity-canvas { width: 100%; height: auto; max-width: 960px; background: #000; }
    </style>
  </head>
  <body>
    <div id="loading-text" style="color: white; font-size: 24px; font-family: sans-serif; text-align: center; margin-top: 20px;">INITIALIZING...</div>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar" style="display:none;">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>

    <script src="jszip.js"></script>
<script>
const loadingText = document.querySelector("#loading-text");
const CACHE_NAME = "hksilksongcache-v2";
const originalFetch = window.fetch;

// 1. Memory-Safe Fetch Override
window.fetch = async function(resource, options) {
  let url = typeof resource === "string" ? resource : resource.url;
  let cleanPath = url.split("/").pop();
  const cache = await caches.open(CACHE_NAME);
  const cachedResponse = await cache.match(cleanPath);
  if (cachedResponse) return cachedResponse;
  return originalFetch(resource, options);
};

async function isCached() {
  const cache = await caches.open(CACHE_NAME);
  const done = await cache.match("CACHE_COMPLETE");
  return !!done;
}

async function cleanupOldCaches() {
  const cacheNames = await caches.keys();
  await Promise.all(cacheNames.map(name => {
    if (name !== CACHE_NAME && name.includes("hksilksong")) return caches.delete(name);
  }));
}

// 2. Optimized Unzip (Clears memory references frequently)
async function unzipAndStore(zipBlob) {
  loadingText.textContent = "EXTRACTING... (DON'T CLOSE TAB)";
  const zip = await JSZip.loadAsync(zipBlob);
  const files = Object.values(zip.files).filter(f => !f.dir);
  const cache = await caches.open(CACHE_NAME);

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    try {
      const blob = await file.async("blob");
      await cache.put(file.name, new Response(blob));
      loadingText.textContent = `EXTRACTING: ${Math.round((i/files.length)*100)}%`;
    } catch (e) { console.error(e); }
  }
  await cache.put("CACHE_COMPLETE", new Response("ok"));
  // Suggest GC to browser
  files.length = 0; 
}

async function fetchWithProgress(url, currentPart, totalParts) {
  const response = await originalFetch(url);
  if (!response.ok) throw new Error("Network error");
  
  const reader = response.body.getReader();
  let received = 0;
  let chunks = [];

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    received += value.length;
    loadingText.textContent = `DOWNLOADING PART ${currentPart}/${totalParts}...`;
  }
  const body = new Uint8Array(received);
  let position = 0;
  for (let chunk of chunks) {
    body.set(chunk, position);
    position += chunk.length;
  }
  return body.buffer;
}

async function mergeFiles(parts) {
  const buffers = [];
  for (let i = 0; i < parts.length; i++) {
    const buf = await fetchWithProgress(parts[i], i + 1, parts.length);
    buffers.push(buf);
  }
  const finalBlob = new Blob(buffers);
  buffers.length = 0; // Clear memory
  return finalBlob;
}

function getParts(file, start, end) {
  let parts = [];
  for (let i = start; i <= end; i++) parts.push(file + ".part" + i);
  return parts;
}

(async () => {
  try {
    await cleanupOldCaches(); 
    if (!(await isCached())) {
      const webglzip = await mergeFiles(getParts("StreamingAssets/aa/WebGL.zip", 1, 100));
      await unzipAndStore(webglzip);
    }

    // 3. Unity Configuration Optimized for Low-RAM Devices
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");

    const buildUrl = "Build";
    const config = {
      dataUrl: buildUrl + "/w-pt.data.unityweb",
      frameworkUrl: buildUrl + "/w-pt.framework.js.unityweb",
      codeUrl: buildUrl + "/w-pt.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Team Cherry",
      productName: "Hollow Knight Silksong",
      productVersion: "1.0",
      devicePixelRatio: 1, // Crucial: Prevents crashing on high-DPI Chromebook screens
      webglContextAttributes: {
        preserveDrawingBuffer: false,
        powerPreference: "high-performance",
        failIfMajorPerformanceCaveat: false 
      },
    };

    loadingBar.style.display = "block";
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/gh/web-ports/hollow-knight-silksong@latest/Build/w-pt.loader.js";

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = (progress * 100) + "%";
        loadingText.textContent = "LAUNCHING GAME...";
      })
      .then(() => {
        loadingBar.remove();
        loadingText.remove();
      })
      .catch((err) => {
        if (err.includes("out of memory")) {
          alert("RAM FULL: Close other tabs and refresh!");
        } else {
          console.error(err);
        }
      });
    };
    document.body.appendChild(script);

  } catch (err) {
    loadingText.textContent = "ERROR: " + err.message;
  }
})();
</script>
  </body>
</html>
