<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/hollow-knight-silksong@master/">
    <meta charset="utf-8">
    <title>Unity Web Player | Hollow Knight SilkSong</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
      #unity-canvas { width: 100vw; height: 100vh; background: #000; }
      #custom-loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
      .progress-bar { width: 200px; height: 4px; background: #333; margin-top: 10px; border-radius: 2px; }
      #progress-fill { width: 0%; height: 100%; background: #fff; transition: width 0.2s; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <div id="custom-loader">
      <div id="status-text">INITIALIZING ENGINE...</div>
      <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <script>
      const statusText = document.querySelector("#status-text");
      const progressFill = document.querySelector("#progress-fill");
      const canvas = document.querySelector("#unity-canvas");

      const buildUrl = "Build";
      const config = {
        dataUrl: buildUrl + "/w-pt.data.unityweb",
        frameworkUrl: buildUrl + "/w-pt.framework.js.unityweb",
        codeUrl: buildUrl + "/w-pt.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "EDUrocks Group, Truffled, GN-Math",
        productName: "Hollow Knight SilkSong",
        productVersion: "1.0",
        
        // --- CHROMEBOOK STABILITY SETTINGS ---
        devicePixelRatio: 1, // Stops high-res crashes
        matchWebGLToCanvasSize: true,
        webglContextAttributes: {
          preserveDrawingBuffer: false,
          powerPreference: "high-performance",
          antialias: false, // Saves significant RAM
          stencil: false,   // Saves RAM
          alpha: false
        },
      };

      const script = document.createElement("script");
      script.src = "https://cdn.jsdelivr.net/gh/web-ports/hollow-knight-silksong@latest/Build/w-pt.loader.js";

      script.onload = () => {
        statusText.textContent = "DOWNLOADING ASSETS...";
        
        createUnityInstance(canvas, config, (progress) => {
          progressFill.style.width = (progress * 100) + "%";
          statusText.textContent = "LOADING: " + Math.round(progress * 100) + "%";
        })
        .then((unityInstance) => {
          document.querySelector("#custom-loader").style.display = "none";
        })
        .catch((err) => {
          console.error(err);
          alert("CRASH DETECTED:\n" + err + "\n\nTry closing all other tabs and Guest Mode.");
          statusText.textContent = "FAILED TO LOAD";
        });
      };

      document.body.appendChild(script);

      // Listen for WebGL context loss (GPU crash)
      canvas.addEventListener("webglcontextlost", function(e) {
        e.preventDefault();
        alert("The Chromebook GPU ran out of memory. Please restart your device.");
      }, false);
    </script>
  </body>
</html>
