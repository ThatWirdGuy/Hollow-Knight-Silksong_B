<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/hollow-knight-silksong@master/">
    <meta charset="utf-8">
    <title>Unity Web Player | Silksong Chromebook Edition</title>
    <style>
      body { background: #000; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #666; font-family: sans-serif; overflow: hidden; }
      #unity-canvas { width: 100%; height: 100%; background: #000; position: absolute; }
      #boot-ui { z-index: 10; text-align: center; width: 100%; }
      .progress-bar { width: 250px; height: 2px; background: #222; margin: 15px auto; overflow: hidden; }
      #fill { width: 0%; height: 100%; background: #fff; transition: width 0.3s; box-shadow: 0 0 8px #fff; }
      #error-log { color: #ff4444; font-size: 12px; margin-top: 10px; display: none; }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    
    <div id="boot-ui">
      <div id="status">INITIALIZING WASM...</div>
      <div class="progress-bar"><div id="fill"></div></div>
      <div id="error-log"></div>
      <div style="font-size: 10px; margin-top: 20px; opacity: 0.5;">LOW-RAM COMPATIBILITY MODE ACTIVE</div>
    </div>

    <script>
      const statusText = document.querySelector("#status");
      const fill = document.querySelector("#fill");
      const canvas = document.querySelector("#unity-canvas");
      const errorLog = document.querySelector("#error-log");

      // AGGRESSIVE MEMORY MANAGEMENT
      const config = {
        dataUrl: "Build/w-pt.data.unityweb",
        frameworkUrl: "Build/w-pt.framework.js.unityweb",
        codeUrl: "Build/w-pt.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "EDUrocks Group",
        productName: "Hollow Knight SilkSong",
        productVersion: "1.0",
        
        // Forced RAM reduction settings
        devicePixelRatio: 1, 
        matchWebGLToCanvasSize: true,
        webglContextAttributes: {
          preserveDrawingBuffer: false,
          powerPreference: "high-performance",
          antialias: false,
          stencil: false,
          alpha: false,
          desynchronized: true
        },
      };

      const script = document.createElement("script");
      script.src = "https://cdn.jsdelivr.net/gh/web-ports/hollow-knight-silksong@latest/Build/w-pt.loader.js";

      script.onload = () => {
        statusText.textContent = "ALLOCATING HEAP...";
        
        createUnityInstance(canvas, config, (progress) => {
          fill.style.width = (progress * 100) + "%";
          statusText.textContent = "LOADING WORLD: " + Math.round(progress * 100) + "%";
        })
        .then(() => {
          document.querySelector("#boot-ui").style.display = "none";
        })
        .catch((err) => {
          console.error(err);
          errorLog.style.display = "block";
          errorLog.textContent = "MEM_LIMIT_REACHED: " + err.toString().slice(0, 50);
          alert("RAM Full (672MB Limit hit). Please Close ALL other apps (Folders, Chrome tabs) and restart.");
        });
      };

      // Force a hardware reset if WebGL hangs
      canvas.addEventListener("webglcontextlost", (e) => {
        e.preventDefault();
        alert("The Chromebook GPU crashed. Restarting engine...");
        location.reload();
      }, false);

      document.body.appendChild(script);
    </script>
  </body>
</html>
