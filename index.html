<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/hollow-knight-silksong@master/">
    <meta charset="utf-8">
    <title>Silksong Lite Booter</title>
    <style>
      body { background: #000; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
      #unity-canvas { width: 100%; height: 100%; position: absolute; }
      #loader { z-index: 10; text-align: center; }
      .bar { width: 200px; height: 2px; background: #333; margin-top: 10px; }
      #fill { width: 0%; height: 100%; background: #00ffcc; transition: width 0.2s; }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas"></canvas>
    
    <div id="loader">
      <div id="status">CONNECTING...</div>
      <div class="bar"><div id="fill"></div></div>
      <div style="font-size: 10px; color: #666; margin-top: 10px;">LOW RAM MODE ACTIVE</div>
    </div>

    <script>
      const status = document.querySelector("#status");
      const fill = document.querySelector("#fill");
      const canvas = document.querySelector("#unity-canvas");

      // AGGRESSIVE MEMORY CONFIG
      const config = {
        dataUrl: "Build/w-pt.data.unityweb",
        frameworkUrl: "Build/w-pt.framework.js.unityweb",
        codeUrl: "Build/w-pt.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Team Cherry",
        productName: "Hollow Knight Silksong",
        productVersion: "1.0",
        devicePixelRatio: 1, 
        webglContextAttributes: {
          preserveDrawingBuffer: false,
          antialias: false,
          alpha: false,
          stencil: false
        },
      };

      const script = document.createElement("script");
      // Use the 'latest' branch loader for better compatibility
      script.src = "https://cdn.jsdelivr.net/gh/web-ports/hollow-knight-silksong@latest/Build/w-pt.loader.js";

      script.onload = () => {
        status.textContent = "LOADING GAME ENGINE...";
        
        createUnityInstance(canvas, config, (progress) => {
          fill.style.width = (progress * 100) + "%";
          status.textContent = "LOADING: " + Math.round(progress * 100) + "%";
          
          // Force a memory clear at 90% (Common hang point)
          if (progress > 0.9) {
            status.textContent = "FINALIZING ASSETS...";
          }
        }).then((unityInstance) => {
          document.querySelector("#loader").style.display = "none";
        }).catch((err) => {
          if (err.toString().includes("memory")) {
            status.textContent = "RAM FULL - REFRESH TAB";
          } else {
            status.textContent = "ERROR: " + err.slice(0, 20);
          }
        });
      };

      document.body.appendChild(script);

      // CRITICAL: Prevent Chromebook from "Sleeping" during the 200MB+ download
      if ('wakeLock' in navigator) {
        navigator.wakeLock.request('screen').catch(()=>{});
      }
    </script>
  </body>
</html>
